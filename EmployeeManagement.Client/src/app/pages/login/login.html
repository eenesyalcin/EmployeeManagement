<div class="login-page-body">
    <div class="wrapper">
        <form action="">
            <h1>GİRİŞ</h1>

            <div class="input-box">
                <input type="email" [(ngModel)]="loginObject.email" name="email" placeholder="Email" required>
                <i class="bx bx-envelope"></i>
            </div>

            <div class="input-box">
                <input type="password" [(ngModel)]="loginObject.contactNo" name="contactNo" placeholder="Şifre"
                    required>
                <i class="bx bx-lock-open"></i>
            </div>

            <button type="button" (click)="onLogin()" class="btn">Giriş</button>
        </form>
    </div>
</div>
