<div class="row">
    <!-- Toastr Kütüphanesi -->
    <div class="col-2 m-2">
        <button type="button" class="btn btn-warning w-100" (click)="showToastrTopRight()">Sağ-Üstte Toastr Göster</button>
    </div>
    <div class="col-2 m-2">
        <button type="button" class="btn btn-warning w-100" (click)="showToastrTopLeft()">Sol-Üstte Toastr Göster</button>
    </div>
    <div class="col-2 m-2">
        <button type="button" class="btn btn-warning w-100" (click)="showToastrTopCenter()">Ortada-Üstte Toastr Göster</button>
    </div>
    <div class="col-2 m-2">
        <button type="button" class="btn btn-warning w-100" (click)="showToastrTopFullWidth()">Tam-Üstte Toastr Göster</button>
    </div>
    <div class="col-2 m-2">
        <button type="button" class="btn btn-warning w-100" (click)="showToastrBottomRight()">Sağ-Altta Toastr Göster</button>
    </div>
    <div class="col-2 m-2">
        <button type="button" class="btn btn-warning w-100" (click)="showToastrBottomLeft()">Sol-Altta Toastr Göster</button>
    </div>
    <div class="col-2 m-2">
        <button type="button" class="btn btn-warning w-100" (click)="showToastrBottomCenter()">Ortada-Altta Toastr Göster</button>
    </div>
    <div class="col-2 m-2">
        <button type="button" class="btn btn-warning w-100" (click)="showToastrBottomFullWidth()">Tam-Altta Toastr Göster</button>
    </div>

    <!-- Spinner Kütüphanesi -->
    <div class="col-2 m-2">
        <button type="button" class="btn btn-warning w-100" (click)="ballClipRotateShowSpinner()">Ball Clip Rotate</button>
    </div>
    <div class="col-2 m-2">
        <button type="button" class="btn btn-warning w-100" (click)="ballSpinClockwiseShowSpinner()">Ball Clip Clockwise</button>
    </div>
    <div class="col-2 m-2">
        <button type="button" class="btn btn-warning w-100" (click)="timerShowSpinner()">Timer</button>
    </div>
</div>
